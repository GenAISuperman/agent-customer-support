apiVersion: apps/v1
kind: Deployment
metadata:
  name: "customer-support"
  namespace: "agents-support"
  labels:
    app: "customer-support"
    team: "support"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "customer-support"
  template:
    metadata:
      labels:
        app: "customer-support"
        team: "support"
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: "sa-customer-support"
      containers:
        - name: "customer-support"
          image: "acrshoppoc.azurecr.io/agents/customer-support:latest"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: "config-customer-support"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
